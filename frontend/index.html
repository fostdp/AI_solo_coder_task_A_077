<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卫星星座轨道控制与碰撞预警系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a2e;color:#e0e0f0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow:hidden;width:100vw;height:100vh}
#canvas-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
canvas{display:block}
#top-bar{position:fixed;top:0;left:0;right:320px;height:56px;background:rgba(10,10,46,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(100,140,255,0.15);z-index:10;display:flex;align-items:center;padding:0 24px;gap:32px}
#top-bar .logo{font-size:16px;font-weight:700;color:#7eb8ff;letter-spacing:1px;white-space:nowrap}
#top-bar .stat{display:flex;align-items:center;gap:8px;font-size:13px;color:#a0b4d8}
#top-bar .stat .label{color:#6888b8;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
#top-bar .stat .value{font-size:15px;font-weight:600;color:#e0ecff}
#top-bar .stat .value.alert-val{color:#ff6b6b}
#top-bar .stat .value.propellant-val{color:#4ecdc4}
.stat-divider{width:1px;height:28px;background:rgba(100,140,255,0.15)}
#alert-panel{position:fixed;top:0;right:0;width:320px;height:100%;background:rgba(10,10,46,0.94);backdrop-filter:blur(12px);border-left:1px solid rgba(100,140,255,0.15);z-index:10;display:flex;flex-direction:column;transition:transform 0.3s ease}
#alert-panel.collapsed{transform:translateX(280px)}
#alert-panel-toggle{position:absolute;left:-36px;top:12px;width:36px;height:36px;background:rgba(10,10,46,0.9);border:1px solid rgba(100,140,255,0.2);border-right:none;border-radius:6px 0 0 6px;color:#7eb8ff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
#alert-panel-toggle:hover{background:rgba(30,30,80,0.95)}
#alert-panel .panel-header{padding:14px 18px;border-bottom:1px solid rgba(100,140,255,0.12);font-size:14px;font-weight:600;color:#7eb8ff;display:flex;align-items:center;justify-content:space-between}
#alert-panel .panel-header .badge{background:#ff4444;color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700}
#alert-list{flex:1;overflow-y:auto;padding:8px}
#alert-list::-webkit-scrollbar{width:4px}
#alert-list::-webkit-scrollbar-track{background:transparent}
#alert-list::-webkit-scrollbar-thumb{background:rgba(100,140,255,0.2);border-radius:2px}
.alert-card{background:rgba(20,20,60,0.6);border:1px solid rgba(100,140,255,0.1);border-radius:8px;padding:12px;margin-bottom:8px;transition:border-color 0.2s}
.alert-card:hover{border-color:rgba(100,140,255,0.3)}
.alert-card.level-1{border-left:3px solid #ffd700}
.alert-card.level-2{border-left:3px solid #ff4444}
.alert-card .alert-pair{font-size:13px;font-weight:600;color:#e0ecff;margin-bottom:6px}
.alert-card .alert-detail{font-size:11px;color:#8899bb;line-height:1.7}
.alert-card .alert-detail span{color:#b0c4e8}
.alert-card .alert-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;margin-left:4px}
.alert-badge.level-1{background:rgba(255,215,0,0.2);color:#ffd700}
.alert-badge.level-2{background:rgba(255,68,68,0.2);color:#ff4444}
.alert-card .btn-avoidance{margin-top:8px;padding:5px 12px;background:rgba(255,68,68,0.15);border:1px solid rgba(255,68,68,0.4);color:#ff6b6b;border-radius:4px;font-size:11px;cursor:pointer;transition:all 0.2s;width:100%;text-align:center}
.alert-card .btn-avoidance:hover{background:rgba(255,68,68,0.3);border-color:rgba(255,68,68,0.7)}
.alert-card .btn-avoidance:disabled{opacity:0.4;cursor:not-allowed}
#detail-panel{position:fixed;top:56px;left:0;width:380px;max-height:calc(100% - 56px);background:rgba(10,10,46,0.95);backdrop-filter:blur(12px);border-right:1px solid rgba(100,140,255,0.15);z-index:15;overflow-y:auto;transform:translateX(-100%);transition:transform 0.3s ease;padding:0}
#detail-panel.open{transform:translateX(0)}
#detail-panel::-webkit-scrollbar{width:4px}
#detail-panel::-webkit-scrollbar-track{background:transparent}
#detail-panel::-webkit-scrollbar-thumb{background:rgba(100,140,255,0.2);border-radius:2px}
.detail-header{position:sticky;top:0;background:rgba(10,10,46,0.98);padding:16px 18px;border-bottom:1px solid rgba(100,140,255,0.12);display:flex;align-items:center;justify-content:space-between;z-index:1}
.detail-header h3{font-size:15px;color:#7eb8ff;font-weight:600}
.detail-close{width:28px;height:28px;border-radius:50%;border:1px solid rgba(100,140,255,0.2);background:transparent;color:#8899bb;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.detail-close:hover{background:rgba(255,68,68,0.15);color:#ff6b6b;border-color:rgba(255,68,68,0.4)}
.detail-section{padding:14px 18px;border-bottom:1px solid rgba(100,140,255,0.08)}
.detail-section h4{font-size:12px;color:#6888b8;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px}
.detail-table{width:100%;border-collapse:collapse}
.detail-table td{padding:3px 0;font-size:12px}
.detail-table td:first-child{color:#6888b8;width:40%}
.detail-table td:last-child{color:#e0ecff;font-weight:500}
.propellant-bar-bg{width:100%;height:6px;background:rgba(100,140,255,0.1);border-radius:3px;overflow:hidden;margin-top:4px}
.propellant-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
#propellant-chart{width:100%;height:100px;border-radius:6px;background:rgba(5,5,30,0.6)}
.telemetry-table{width:100%;border-collapse:collapse;font-size:10px}
.telemetry-table th{text-align:left;padding:4px 6px;color:#6888b8;border-bottom:1px solid rgba(100,140,255,0.1);font-weight:500}
.telemetry-table td{padding:3px 6px;color:#b0c4e8;border-bottom:1px solid rgba(100,140,255,0.04)}
.telemetry-table tr:hover{background:rgba(100,140,255,0.04)}
.risk-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.risk-badge.safe{background:rgba(0,255,0,0.12);color:#4ecdc4}
.risk-badge.warning{background:rgba(255,255,0,0.12);color:#ffd700}
.risk-badge.danger{background:rgba(255,0,0,0.12);color:#ff4444}
#loading-overlay{position:fixed;inset:0;background:rgba(10,10,46,0.95);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s}
#loading-overlay.hidden{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:3px solid rgba(100,140,255,0.15);border-top-color:#7eb8ff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-overlay p{margin-top:16px;color:#6888b8;font-size:13px}
#toast-container{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:50;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{padding:10px 20px;border-radius:6px;font-size:13px;color:#fff;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:rgba(0,200,120,0.9)}
.toast.error{background:rgba(255,68,68,0.9)}
.toast.info{background:rgba(80,130,255,0.9)}
.ws-status{position:fixed;bottom:12px;left:12px;z-index:10;font-size:10px;padding:4px 10px;border-radius:12px;background:rgba(10,10,46,0.8);border:1px solid rgba(100,140,255,0.15)}
.ws-status.connected{color:#4ecdc4;border-color:rgba(78,205,196,0.3)}
.ws-status.disconnected{color:#ff6b6b;border-color:rgba(255,107,107,0.3)}
</style>
</head>
<body>
<div id="canvas-container"></div>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p>正在加载卫星星座数据...</p>
</div>

<div id="top-bar">
  <div class="logo">&#x1F6F0; 星座轨道控制系统</div>
  <div class="stat-divider"></div>
  <div class="stat">
    <span class="label">卫星总数</span>
    <span class="value" id="stat-total">--</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <span class="label">活跃警报</span>
    <span class="value alert-val" id="stat-alerts">--</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <span class="label">平均推进剂</span>
    <span class="value propellant-val" id="stat-propellant">--</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <span class="label">覆盖状态</span>
    <span class="value" id="stat-coverage">--</span>
  </div>
</div>

<div id="alert-panel">
  <button id="alert-panel-toggle">&#x25B6;</button>
  <div class="panel-header">
    <span>碰撞预警</span>
    <span class="badge" id="alert-count-badge">0</span>
  </div>
  <div id="alert-list"></div>
</div>

<div id="detail-panel">
  <div class="detail-header">
    <h3 id="detail-title">卫星详情</h3>
    <button class="detail-close" id="detail-close">&times;</button>
  </div>
  <div id="detail-content"></div>
</div>

<div class="ws-status disconnected" id="ws-status">WS: 未连接</div>
<div id="toast-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="orbit_3d_viewer.js"></script>
<script src="sat_detail.js"></script>
<script>
(function() {
  'use strict';

  window.Sat3DViewer.setOnSatelliteClick(function(satId) {
    window.SatDetailView.openDetailPanel(satId);
  });

  window.Sat3DViewer.init();
  window.SatDetailView.init();
  window.SatDetailView.loadOverview();
  window.SatDetailView.loadAlerts();
  window.SatDetailView.startAutoRefresh();

  var overlay = document.getElementById('loading-overlay');
  setTimeout(function() {
    overlay.classList.add('hidden');
    setTimeout(function() { overlay.style.display = 'none'; }, 600);
  }, 2000);
})();
</script>
</body>
</html>
